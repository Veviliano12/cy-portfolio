<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>eShare 投影 · 交互还原 Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --blue:#1f6fe6;
    --blue-strong:#2f6fe6;
    --ink:#3a3f47;
  }
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    background:transparent;display:flex;align-items:center;justify-content:center;
    min-height:100vh;-webkit-font-smoothing:antialiased;color:var(--ink);
  }

  /* ===== Controller ===== */
  .controller{
    position:fixed;top:20px;left:20px;z-index:50;background:#fff;border-radius:14px;
    padding:16px 18px;box-shadow:0 8px 30px rgba(0,0,0,.18);width:232px;
  }
  .controller h3{font-size:13px;color:#888;margin-bottom:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
  .ctrl-row{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
  .ctrl-row:last-child{margin-bottom:0;}
  .ctrl-btn{
    border:1px solid #e3e6ea;background:#f7f8fa;border-radius:10px;padding:9px 12px;
    font-size:13px;color:#374151;cursor:pointer;text-align:left;transition:all .15s;
    display:flex;align-items:center;gap:8px;
  }
  .ctrl-btn:hover{background:#eef1f5;}
  .ctrl-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .ctrl-btn .dot{width:7px;height:7px;border-radius:50%;background:#c2c7cf;flex-shrink:0;}
  .ctrl-btn.active .dot{background:#fff;}
  .ctrl-divider{height:1px;background:#eee;margin:12px 0;}
  .mode-panel{display:none;}
  .mode-panel.show{display:block;}

  /* ===== Version 1 (old style) ===== */
  .win-v1{
    width:416px;border-radius:8px;overflow:hidden;
    box-shadow:0 18px 60px rgba(20,30,60,.28);
    display:none;flex-direction:column;min-height:670px;
  }
  .win-v1.show{display:flex;}
  .v1-titlebar{
    background:#1a50a8;height:44px;display:flex;align-items:center;
    justify-content:space-between;padding:0 14px;flex-shrink:0;
  }
  .v1-logo{color:#fff;font-size:18px;font-weight:700;letter-spacing:.3px;}
  .v1-winctrls{display:flex;gap:2px;}
  .v1-winctrls button{
    width:32px;height:28px;background:transparent;border:none;cursor:pointer;
    color:rgba(255,255,255,.8);font-size:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  }
  .v1-winctrls button:hover{background:rgba(255,255,255,.15);}
  .v1-body{
    background:#fff;padding:68px 0 32px;display:flex;flex-direction:column;align-items:center;flex:1;
  }
  .v1-heading{font-size:20px;color:#111;font-weight:400;margin-bottom:28px;letter-spacing:1px;}
  .v1-display{
    display:flex;align-items:flex-end;gap:6px;margin-bottom:4px;padding:0 32px;
    min-width:280px;justify-content:center;
  }
  .v1-cell{
    width:36px;display:flex;flex-direction:column;align-items:center;
    border-bottom:2.5px solid #1a50a8;padding-bottom:4px;
    font-size:38px;font-weight:600;color:#1a50a8;line-height:1;min-height:48px;
    justify-content:flex-end;font-family:"Segoe UI","Arial",sans-serif;
    letter-spacing:0;
  }
  .v1-cell.empty{color:transparent;}
  .v1-dash{font-size:28px;color:#555;padding-bottom:6px;line-height:1;align-self:flex-end;}
  .v1-keypad{
    background:#1c3d8f;padding:16px 16px 14px;display:grid;
    grid-template-columns:repeat(3,1fr);gap:3px;flex-shrink:0;
  }
  .v1-key{
    height:70px;background:#2255b0;border:none;cursor:pointer;
    font-size:26px;color:#fff;font-weight:400;display:flex;align-items:center;
    justify-content:center;transition:background .1s,transform .08s;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    border-radius:2px;
  }
  .v1-key:hover{background:#2a62c4;}
  .v1-key:active{background:#1a4595;transform:scale(.97);}
  .v1-key.v1-txt{font-size:16px;}
  .v1-key.v1-icon{font-size:20px;}
  .v1-footer{
    background:#fff;height:44px;display:flex;align-items:center;
    justify-content:space-between;padding:0 16px;
  }
  .v1-footer-icon{width:28px;height:28px;background:#e8eaed;border-radius:4px;display:flex;align-items:center;justify-content:center;}
  .v1-welink{color:#c0392b;font-weight:700;font-size:17px;}

  /* ===== Version 2 & 3 (new style) ===== */
  .win{
    width:416px;border-radius:22px;position:relative;overflow:hidden;padding-bottom:16px;
    background:#eef3fb;
    box-shadow:0 18px 60px rgba(40,55,90,.22);
    display:none;
  }
  .win.show{display:block;}

  /* titlebar */
  .titlebar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 4px;}
  .logo{font-size:22px;font-weight:700;color:#2f86e6;letter-spacing:.2px;}
  .winctrls{display:flex;align-items:center;gap:6px;color:#7e858f;}
  .winctrls button{
    width:38px;height:38px;border:none;background:transparent;border-radius:8px;cursor:pointer;
    color:#7e858f;display:flex;align-items:center;justify-content:center;
  }
  .winctrls button:hover{background:rgba(120,140,170,.12);}

  /* stage */
  .stage{position:relative;height:272px;}
  .waves{position:absolute;left:50%;top:156px;transform:translateX(-50%);width:0;height:0;pointer-events:none;z-index:0;}
  .wave{
    position:absolute;left:0;top:0;width:210px;height:210px;margin:-105px 0 0 -105px;border-radius:50%;
    background:radial-gradient(circle, rgba(60,130,235,.16), rgba(60,130,235,.04) 48%, rgba(60,130,235,0) 64%);
    clip-path:inset(0 0 50% 0);
    opacity:0;transform:scale(.32);
  }
  .win.multi .wave{animation:wave 2.8s ease-out infinite;}
  .win.multi .wave:nth-child(2){animation-delay:1.4s;}
  @keyframes wave{0%{opacity:0;transform:scale(.32);}16%{opacity:.75;}100%{opacity:0;transform:scale(2.5);}}
  .title{
    position:absolute;top:18px;left:0;right:0;text-align:center;
    font-size:30px;font-weight:500;color:#41464d;letter-spacing:3px;transition:opacity .3s;
  }
  .win.multi .title{opacity:0;}
  .subtitle{
    position:absolute;left:0;right:0;text-align:center;font-size:16px;color:#3f444b;
    opacity:0;transition:opacity .3s;z-index:2;line-height:1.6;
  }
  /* v3 single */
  .win.v3.single .subtitle{top:96px;opacity:1;}
  .win.v3.multi .subtitle{top:131px;opacity:0;}
  .win.v3.multi.balls-ready .subtitle{opacity:1;}
  /* v2 modes */
  .win.v2.auto1 .subtitle{top:80px;opacity:1;}
  .win.v2.auto2 .subtitle{top:80px;opacity:1;}
  .win.v2.auto3 .subtitle{top:80px;opacity:1;}
  /* v2 inputbox raised + no ripple */
  .win.v2 .inputbox{top:108px;}
  .win.v2 .ripple{animation:none;opacity:0;}
  /* v2 swap row below inputbox */
  .v2swap{
    position:absolute;left:0;right:0;top:244px;text-align:center;
    font-size:15px;color:#888;opacity:0;pointer-events:none;
    transition:opacity .3s;z-index:2;
  }
  .v2swap.show{opacity:1;pointer-events:auto;}
  .v2swap .swaplink{
    color:var(--blue);cursor:pointer;font-weight:500;
    border-bottom:1px solid transparent;transition:border-color .15s;
  }
  .v2swap .swaplink:hover{border-bottom-color:var(--blue);}
  .subtitle b{color:var(--blue);font-weight:700;font-size:18px;margin:0 3px;}

  /* balls */
  .balls{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:center;align-items:flex-start;gap:42px;z-index:1;}
  .balls.n3{gap:14px;}
  .ball{cursor:pointer;opacity:1;transition:opacity .45s, transform .45s cubic-bezier(.22,1,.36,1);}
  .ball.entering{opacity:0;transform:translateY(22px);}
  .arc-wrap{transform:translateY(var(--arc,0px));transition:transform .35s cubic-bezier(.22,1,.36,1);}
  .orb{
    width:88px;height:88px;border-radius:50%;background:#fff;
    box-shadow:0 6px 18px rgba(70,110,180,.16);display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:var(--blue);
    animation:bob 3.4s ease-in-out infinite;transition:background .25s,box-shadow .25s,color .25s;
  }
  .ball .code{font-size:17px;font-weight:600;letter-spacing:.3px;}
  .ball .room{font-size:12px;color:#9aa0a8;margin-top:3px;}
  .ball:hover .orb{
    background:radial-gradient(circle at 50% 32%,#5aa6ff,#1f6fe6);color:#fff;
    box-shadow:0 12px 26px rgba(40,110,230,.4);
  }
  .ball:hover .room{color:rgba(255,255,255,.85);}
  .ball:hover .arc-wrap{transform:translateY(var(--arc,0px)) scale(1.06);}
  .ball.leaving{position:absolute;margin:0;z-index:1;transition:opacity .4s;}
  .ball.leaving .orb{animation:none;transition:transform .4s;transform:scale(.45);}
  .ball.leaving.gone{opacity:0;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  .ball:nth-child(2) .orb{animation-delay:-1.1s;}
  .ball:nth-child(3) .orb{animation-delay:-2.2s;}

  /* input box */
  .inputbox{
    position:absolute;top:128px;left:0;right:0;margin:0 auto;width:348px;
    border-radius:18px;padding:2.5px;transform-origin:center bottom;
    transition:transform .42s cubic-bezier(.22,1,.36,1);
    background:linear-gradient(90deg,#5b8def,#8a7cf0,#e57ab5,#f0a35a,#e3d05a,#6cc88a,#5b8def);
    background-size:300% 100%;animation:flow 4.5s linear infinite;
    box-shadow:0 6px 22px rgba(80,110,170,.12);
  }
  .win.multi .inputbox{transform:scale(.72);}
  @keyframes flow{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
  .face{
    background:#fff;border-radius:15.5px;height:120px;display:flex;align-items:center;
    justify-content:center;gap:6px;padding:0 16px;
  }
  .cell{
    width:42px;height:60px;border-radius:10px;background:#eceef1;display:flex;
    align-items:center;justify-content:center;font-size:53px;font-weight:700;line-height:1;
    color:transparent;font-family:"Segoe UI","Arial",sans-serif;
    transition:background .2s,color .2s;
  }
  .cell.filled{background:transparent;color:var(--blue);}
  .dash{width:20px;display:flex;align-items:center;justify-content:center;}
  .dash::before{content:'';width:15px;height:6px;border-radius:3px;background:#cfd3d8;transition:background .2s;}
  .dash.on::before{background:var(--blue);}

  /* keypad */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 44px 0;}
  .key{
    height:46px;border-radius:17px;background:#ffffff;display:flex;align-items:center;
    justify-content:center;font-size:25px;color:#3a3f47;cursor:pointer;user-select:none;
    box-shadow:0 2px 5px rgba(70,100,150,.07);transition:background .12s,box-shadow .12s,transform .08s;
  }
  .key:hover{background:#fbfcfe;box-shadow:0 3px 8px rgba(70,100,150,.11);}
  .key:active{background:#f0f2f5;transform:scale(.97);}
  .key.txt{font-size:18px;}
  .key.icon svg{stroke:#9097a0;}

  /* extend */
  .extend{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:15px;color:#566070;}
  .extend .box{width:15px;height:15px;border:1.5px solid #aeb4bd;border-radius:3px;}
  .extend .q{width:16px;height:16px;border-radius:50%;border:1px solid #b9bfc7;font-size:11px;color:#9aa0a8;display:flex;align-items:center;justify-content:center;}

  /* project button */
  .project{
    margin:11px 34px 0;height:52px;width:calc(100% - 68px);border-radius:14px;border:none;
    background:#bcd2f3;color:#eef4fd;font-size:18px;letter-spacing:4px;font-weight:500;cursor:not-allowed;
    transition:background .25s,color .25s;
  }
  .project.on{background:var(--blue-strong);color:#fff;cursor:pointer;}
  .project.on:hover{background:#2a64d8;}

  /* footer */
  .footer{display:flex;align-items:center;justify-content:space-between;padding:15px 28px 0;color:#9aa0a8;position:relative;}
  .footer .grp{display:flex;align-items:center;gap:14px;}
  .footer .mid,.proj-footer .mid{position:absolute;left:50%;transform:translateX(-50%);}
  .footer .grp svg{display:block;}
  .footer .sep{width:1px;height:16px;background:#d7dade;}
  .footer .welink{color:#c0392b;font-weight:700;font-size:17px;}

  /* Projecting screen */
  .projecting{
    position:absolute;inset:0;border-radius:22px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#e9f0fa 0%,#f3f7fc 26%,#f9fbfe 100%);
    opacity:0;visibility:hidden;transition:opacity .3s;z-index:20;
  }
  .projecting.show{opacity:1;visibility:visible;}
  .proj-title{text-align:center;font-size:30px;font-weight:500;color:#41464d;letter-spacing:3px;margin-top:14px;}
  .proj-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding-bottom:38px;}
  .proj-code{font-size:28px;font-weight:700;color:var(--blue);letter-spacing:2px;margin-bottom:6px;z-index:2;}
  .laptop-wrap{position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;overflow:visible;}
  .ripple{
    position:absolute;left:50%;top:50%;width:110px;height:110px;margin:-55px 0 0 -55px;border-radius:50%;
    background:radial-gradient(circle,rgba(45,120,230,.18),rgba(45,120,230,.05));
    transform:scale(.5);opacity:0;animation:rip 2.7s ease-out infinite;
  }
  .ripple:nth-child(2){animation-delay:.9s;}
  .ripple:nth-child(3){animation-delay:1.8s;}
  @keyframes rip{0%{transform:scale(.5);opacity:0;}12%{opacity:.7;}100%{transform:scale(2.6);opacity:0;}}
  .laptop{
    width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#3aa0ff,#1668e6);
    display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 8px 22px rgba(30,100,220,.35);
  }
  .proj-extend{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;color:#9aa0a8;margin-bottom:16px;}
  .proj-extend .box{width:15px;height:15px;border:1.5px solid #c2c7cf;border-radius:3px;}
  .disconnect{
    margin:0 34px;height:52px;width:calc(100% - 68px);border-radius:14px;border:none;background:#e8463c;color:#fff;
    font-size:18px;letter-spacing:4px;font-weight:500;cursor:pointer;transition:background .2s;
  }
  .disconnect:hover{background:#d83a30;}
  .proj-footer{display:flex;align-items:center;justify-content:space-between;padding:15px 28px 18px;color:#9aa0a8;position:relative;}
  .proj-footer .grp{display:flex;align-items:center;gap:12px;}
</style>
</head>
<body>

<!-- ===== Controller ===== -->
<div class="controller" id="controller" style="display:none">
  <h3>版本切换</h3>
  <div class="ctrl-row">
    <button class="ctrl-btn" data-ver="1"><span class="dot"></span>版本1·旧款 UI</button>
    <button class="ctrl-btn" data-ver="2"><span class="dot"></span>版本2·简洁识别</button>
    <button class="ctrl-btn active" data-ver="3"><span class="dot"></span>版本3·球形选择</button>
  </div>

  <div class="ctrl-divider"></div>

  <div class="mode-panel" id="modePanel">
    <h3>模拟识别码数量</h3>
    <div class="ctrl-row">
      <button class="ctrl-btn active" data-mode="0"><span class="dot"></span>0 个（初始）</button>
      <button class="ctrl-btn" data-mode="1"><span class="dot"></span>识别到 1 个</button>
      <button class="ctrl-btn" data-mode="2"><span class="dot"></span>识别到 2 个</button>
      <button class="ctrl-btn" data-mode="3"><span class="dot"></span>识别到 3 个</button>
    </div>
  </div>
</div>

<!-- ===== Version 1 (old style) ===== -->
<div class="win-v1" id="winV1">
  <div class="v1-titlebar">
    <span class="v1-logo">eShare</span>
    <div class="v1-winctrls">
      <button>—</button>
      <button>✕</button>
    </div>
  </div>
  <div class="v1-body">
    <div class="v1-heading">输入投影码</div>
    <div class="v1-display" id="v1display">
      <span class="v1-cell empty" id="v1c0"></span>
      <span class="v1-cell empty" id="v1c1"></span>
      <span class="v1-cell empty" id="v1c2"></span>
      <span class="v1-dash">—</span>
      <span class="v1-cell empty" id="v1c3"></span>
      <span class="v1-cell empty" id="v1c4"></span>
      <span class="v1-cell empty" id="v1c5"></span>
    </div>
  </div>
  <div class="v1-keypad" id="v1keypad">
    <button class="v1-key" data-k="1">1</button>
    <button class="v1-key" data-k="2">2</button>
    <button class="v1-key" data-k="3">3</button>
    <button class="v1-key" data-k="4">4</button>
    <button class="v1-key" data-k="5">5</button>
    <button class="v1-key" data-k="6">6</button>
    <button class="v1-key" data-k="7">7</button>
    <button class="v1-key" data-k="8">8</button>
    <button class="v1-key" data-k="9">9</button>
    <button class="v1-key v1-icon" data-k="back">⌫</button>
    <button class="v1-key" data-k="0">0</button>
    <button class="v1-key v1-txt" data-k="clear">清除</button>
  </div>
  <div class="v1-footer">
    <div class="v1-footer-icon">
      <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="#888" stroke-width="1.5">
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M16 13.5a1.4 1.4 0 0 0 .28 1.54l.05.05a1.7 1.7 0 1 1-2.4 2.4l-.05-.05a1.4 1.4 0 0 0-1.54-.28 1.4 1.4 0 0 0-.84 1.28V18a1.7 1.7 0 0 1-3.4 0v-.08A1.4 1.4 0 0 0 7.18 16.6a1.4 1.4 0 0 0-1.54.28l-.05.05a1.7 1.7 0 1 1-2.4-2.4l.05-.05a1.4 1.4 0 0 0 .28-1.54A1.4 1.4 0 0 0 2.24 12H2a1.7 1.7 0 0 1 0-3.4h.07A1.4 1.4 0 0 0 3.4 7.18a1.4 1.4 0 0 0-.28-1.54l-.05-.05a1.7 1.7 0 1 1 2.4-2.4l.05.05a1.4 1.4 0 0 0 1.54.28H7a1.4 1.4 0 0 0 .84-1.28V2a1.7 1.7 0 0 1 3.4 0v.07a1.4 1.4 0 0 0 .85 1.28 1.4 1.4 0 0 0 1.54-.28l.05-.05a1.7 1.7 0 1 1 2.4 2.4l-.05.05a1.4 1.4 0 0 0-.28 1.54V9a1.4 1.4 0 0 0 1.28.85H18a1.7 1.7 0 0 1 0 3.4h-.07A1.4 1.4 0 0 0 16 13.5z"/>
      </svg>
    </div>
    <span class="v1-welink">WeLink</span>
  </div>
</div>

<!-- ===== Version 2 & 3 (new style, shared HTML) ===== -->
<div class="win" id="win">
  <div class="titlebar">
    <div class="logo">eShare</div>
    <div class="winctrls">
      <button aria-label="最小化"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button aria-label="关闭"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
    </div>
  </div>

  <div class="stage">
    <div class="waves"><span class="wave"></span><span class="wave"></span></div>
    <div class="title">投影</div>
    <div class="balls" id="balls"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="v2swap" id="v2swap">识别不准？<span class="swaplink" id="swapLink">换一个</span></div>
    <div class="inputbox" id="inputbox">
      <div class="face">
        <span class="cell"></span><span class="cell"></span><span class="cell"></span>
        <span class="dash" id="dash"></span>
        <span class="cell"></span><span class="cell"></span><span class="cell"></span>
      </div>
    </div>
  </div>

  <div class="keypad" id="keypad">
    <div class="key" data-key="1">1</div><div class="key" data-key="2">2</div><div class="key" data-key="3">3</div>
    <div class="key" data-key="4">4</div><div class="key" data-key="5">5</div><div class="key" data-key="6">6</div>
    <div class="key" data-key="7">7</div><div class="key" data-key="8">8</div><div class="key" data-key="9">9</div>
    <div class="key txt" data-key="clear">清空</div>
    <div class="key" data-key="0">0</div>
    <div class="key icon" data-key="back"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke-width="1.7"><path d="M21 4H8l-5 8 5 8h13a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></div>

  <div class="extend">
    <span class="box"></span><span>启用扩展屏</span><span class="q">?</span>
  </div>

  <button class="project" id="project">投影</button>

  <div class="footer">
    <div class="grp">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
    <div class="grp mid">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9.5" x2="9.01" y2="9.5"/><line x1="15" y1="9.5" x2="15.01" y2="9.5"/></svg>
      <span class="sep"></span>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="welink">Meeting</div>
  </div>

  <!-- Projecting screen -->
  <div class="projecting" id="projScreen">
    <div class="titlebar">
      <div class="logo">eShare</div>
      <div class="winctrls">
        <button><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>
    </div>
    <div class="proj-title">投影中</div>
    <div class="proj-mid">
      <div class="proj-code" id="projCode"></div>
      <div class="laptop-wrap">
        <span class="ripple"></span><span class="ripple"></span><span class="ripple"></span>
        <div class="laptop">
          <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#fff" stroke-width="1.5"><rect x="3" y="4.5" width="18" height="12" rx="1.5" fill="rgba(255,255,255,.18)"/><path d="M1.5 20h21" stroke-linecap="round"/></svg>
        </div>
      </div>
    </div>
    <div class="proj-extend"><span class="box"></span><span>启用扩展屏</span></div>
    <button class="disconnect" id="disconnect">断开</button>
    <div class="proj-footer">
      <div class="grp">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <svg viewBox="0 0 24 24" width="19" height="19"><rect x="2" y="13" width="3.2" height="7" rx="1" fill="#34c759"/><rect x="7.5" y="9" width="3.2" height="11" rx="1" fill="#34c759"/><rect x="13" y="5" width="3.2" height="15" rx="1" fill="#34c759"/><rect x="18.5" y="2" width="3.2" height="18" rx="1" fill="#d2d6db"/></svg>
      </div>
      <div class="grp mid">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9.5" x2="9.01" y2="9.5"/><line x1="15" y1="9.5" x2="15.01" y2="9.5"/></svg>
        <span style="width:1px;height:16px;background:#d7dade;display:inline-block;"></span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div style="color:#c0392b;font-weight:700;font-size:17px;">Meeting</div>
    </div>
  </div>
</div>

<script>
  /* ── data ── */
  const CODES = [
    {code:'508-752', room:'4A-21R'},
    {code:'966-826', room:'1B-08R'},
    {code:'773-401', room:'3C-12R'},
  ];

  /* ── state ── */
  let currentVersion = 3;  // 1 | 2 | 3
  let mode = 0;            // 0..3 (v2/v3: how many codes detected)
  let selectedCode = null;
  let typedValue = '';
  let v2SwapIndex = 0;     // version 2 swap pointer

  /* ── Version 1 (old) ── */
  const v1Cells = [0,1,2,3,4,5].map(i => document.getElementById('v1c'+i));
  let v1Input = '';

  function v1Render(){
    const d = v1Input;
    v1Cells.forEach((c,i) => {
      if(d[i] !== undefined){ c.textContent = d[i]; c.classList.remove('empty'); }
      else { c.textContent = ''; c.classList.add('empty'); }
    });
  }

  document.getElementById('v1keypad').addEventListener('click', e => {
    const k = e.target.closest('.v1-key');
    if(!k) return;
    const v = k.dataset.k;
    if(v === 'clear'){ v1Input = ''; }
    else if(v === 'back'){ v1Input = v1Input.slice(0,-1); }
    else { if(v1Input.length < 6) v1Input += v; }
    v1Render();
  });

  /* ── Version 2 & 3 shared DOM ── */
  const win = document.getElementById('win');
  const ballsEl = document.getElementById('balls');
  const subtitle = document.getElementById('subtitle');
  const cells = [...document.querySelectorAll('.cell')];
  const dashEl = document.getElementById('dash');
  const project = document.getElementById('project');
  const keypad = document.getElementById('keypad');
  const projScreen = document.getElementById('projScreen');
  const projCode = document.getElementById('projCode');

  const digitsOf = s => s.replace('-','');
  function currentDigits(){ return selectedCode ? digitsOf(selectedCode) : typedValue; }

  function renderInput(){
    const d = currentDigits();
    cells.forEach((c,i)=>{
      if(d[i]!==undefined){ c.textContent=d[i]; c.classList.add('filled'); }
      else { c.textContent=''; c.classList.remove('filled'); }
    });
    dashEl.classList.toggle('on', d.length>0);
  }

  function updateButton(){ project.classList.toggle('on', currentDigits().length===6); }

  /* ── Version 2: subtitle with swap ── */
  const v2swapEl = document.getElementById('v2swap');

  function v2UpdateSubtitle(){
    if(mode === 0){ subtitle.innerHTML=''; v2swapEl.classList.remove('show'); return; }
    const pool = CODES.slice(0, mode);
    const c = pool[v2SwapIndex % pool.length];
    if(mode === 1){
      subtitle.innerHTML = `已自动识别您处在 <b>${c.room}</b> 会议室`;
      v2swapEl.classList.remove('show');
    } else {
      subtitle.innerHTML = `识别您处在 <b>${c.room}</b> 会议室`;
      v2swapEl.classList.add('show');
    }
  }

  document.getElementById('swapLink').addEventListener('click', ()=>{
    if(currentVersion !== 2) return;
    const pool = CODES.slice(0, mode);
    v2SwapIndex = (v2SwapIndex + 1) % pool.length;
    const nc = pool[v2SwapIndex];
    selectedCode = nc.code; typedValue = '';
    renderV2Input(nc);
    v2UpdateSubtitle();
    updateButton();
  });

  function renderV2Input(c){
    selectedCode = c.code;
    typedValue = '';
    renderInput();
  }

  /* ── Version 3: subtitle ── */
  function v3UpdateSubtitle(){
    if(mode===0){ subtitle.innerHTML=''; return; }
    if(mode===1){ subtitle.innerHTML=`已自动识别您处在 <b>${CODES[0].room}</b> 会议室`; return; }
    if(selectedCode){
      const c = CODES.find(x=>x.code===selectedCode);
      subtitle.innerHTML = `识别您处在 <b>${c?c.room:''}</b> 会议室`;
    } else {
      subtitle.textContent = '识别到多个白板，请选择';
    }
  }

  /* ── Balls (v3 only) ── */
  function makeBall(c){
    const el = document.createElement('div');
    el.className='ball'; el.dataset.code=c.code;
    el.innerHTML=`<div class="arc-wrap"><div class="orb"><div class="code">${c.code}</div><div class="room">${c.room}</div></div></div>`;
    el.addEventListener('click', ()=>{
      selectedCode=c.code; typedValue='';
      renderBalls(); renderInput(); v3UpdateSubtitle(); updateButton();
    });
    return el;
  }

  function renderBalls(){
    if(mode<2){ ballsEl.innerHTML=''; ballsEl.classList.remove('n3'); return; }
    const list = CODES.slice(0,mode).filter(c=>c.code!==selectedCode);
    ballsEl.classList.toggle('n3', list.length>=3);
    const old = new Map();
    ballsEl.querySelectorAll('.ball:not(.leaving)').forEach(el=>{ old.set(el.dataset.code, el.getBoundingClientRect()); });
    const want = list.map(c=>c.code);
    const prect = ballsEl.getBoundingClientRect();
    ballsEl.querySelectorAll('.ball:not(.leaving)').forEach(el=>{
      if(!want.includes(el.dataset.code)){
        const r=old.get(el.dataset.code);
        el.classList.add('leaving');
        el.style.left=(r.left-prect.left)+'px'; el.style.top=(r.top-prect.top)+'px'; el.style.width=r.width+'px';
        requestAnimationFrame(()=>el.classList.add('gone'));
        setTimeout(()=>el.remove(),420);
      }
    });
    list.forEach(c=>{
      let el=ballsEl.querySelector(`.ball[data-code="${c.code}"]:not(.leaving)`);
      if(!el){ el=makeBall(c); el.classList.add('entering'); ballsEl.appendChild(el); requestAnimationFrame(()=>el.classList.remove('entering')); }
      else ballsEl.appendChild(el);
    });
    const els=list.map(c=>ballsEl.querySelector(`.ball[data-code="${c.code}"]:not(.leaving)`));
    els.forEach((el,i)=>{
      el.style.setProperty('--arc', (els.length===3&&i!==1)?'12px':'0px');
    });
    requestAnimationFrame(()=>{
      list.forEach(c=>{
        const el=ballsEl.querySelector(`.ball[data-code="${c.code}"]:not(.leaving)`);
        const o=old.get(c.code); if(!o) return;
        const n=el.getBoundingClientRect();
        const dx=o.left-n.left, dy=o.top-n.top;
        if(dx||dy){
          el.style.transition='none'; el.style.transform=`translate(${dx}px,${dy}px)`;
          requestAnimationFrame(()=>{ el.style.transition='transform .45s cubic-bezier(.22,1,.36,1)'; el.style.transform=''; });
        }
      });
    });
  }

  /* ── Keypad (v2/v3) ── */
  function press(v){
    let d = currentDigits();
    if(v==='clear'){ typedValue=''; selectedCode=null; }
    else if(v==='back'){ typedValue=d.slice(0,-1); selectedCode=null; }
    else { if(d.length<6){ typedValue=d+v; selectedCode=null; } }
    if(currentVersion===3 && mode>=2) renderBalls();
    renderInput();
    if(currentVersion===2) v2UpdateSubtitle();
    else v3UpdateSubtitle();
    updateButton();
  }
  keypad.addEventListener('click', e=>{ const k=e.target.closest('.key'); if(!k) return; press(k.dataset.key); });

  /* ── setMode (v2/v3) ── */
  let ballTimer;
  function setMode(m){
    clearTimeout(ballTimer);
    mode=m; selectedCode=null; typedValue='';
    v2SwapIndex=0;
    win.classList.remove('balls-ready','single','multi','auto1','auto2','auto3','v2','v3');
    win.classList.add(currentVersion===2?'v2':'v3');
    projScreen.classList.remove('show');
    renderInput(); updateButton();

    if(currentVersion===2){
      // Version 2: no balls, direct fill
      ballsEl.innerHTML=''; ballsEl.classList.remove('n3');
      if(m===0){
        subtitle.innerHTML='';
      } else {
        const pool = CODES.slice(0, m);
        const c = pool[0];
        renderV2Input(c);
        updateButton();
        win.classList.add('auto'+m);
        v2UpdateSubtitle();
      }
    } else {
      // Version 3: original ball logic
      win.classList.toggle('single', m===1);
      win.classList.toggle('multi', m>=2);
      if(m===1){ typedValue='508752'; renderInput(); }
      v3UpdateSubtitle(); updateButton();
      if(m>=2){
        ballsEl.innerHTML='';
        ballTimer=setTimeout(()=>{ win.classList.add('balls-ready'); renderBalls(); }, 400);
      } else {
        renderBalls();
      }
    }
  }

  /* ── Version switching ── */
  const winV1 = document.getElementById('winV1');
  const modePanel = document.getElementById('modePanel');

  function switchVersion(v){
    currentVersion = v;
    document.querySelectorAll('[data-ver]').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.ver)===v));
    winV1.classList.toggle('show', v===1);
    win.classList.toggle('show', v===2||v===3);
    modePanel.classList.toggle('show', v===2||v===3);
    if(v===1){
      v1Input=''; v1Render();
    } else {
      setMode(mode);
    }
  }

  /* ── Controller events ── */
  document.querySelectorAll('[data-ver]').forEach(btn=>{
    btn.addEventListener('click', ()=>switchVersion(parseInt(btn.dataset.ver)));
  });

  document.querySelectorAll('[data-mode]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      setMode(parseInt(btn.dataset.mode));
    });
  });

  /* ── Project button ── */
  project.addEventListener('click', ()=>{
    if(!project.classList.contains('on')) return;
    if(currentVersion===3 && mode===1){ projCode.style.display=''; projCode.textContent=CODES[0].room; }
    else if(currentVersion===2 && mode>=1){
      const pool=CODES.slice(0,mode);
      const c=pool[v2SwapIndex%pool.length];
      projCode.style.display=''; projCode.textContent=c.room;
    } else { projCode.style.display='none'; }
    projScreen.classList.add('show');
  });
  document.getElementById('disconnect').addEventListener('click', ()=>projScreen.classList.remove('show'));

  /* ── postMessage API (for portfolio iframe control) ── */
  window.addEventListener('message', function(e){
    var d=e.data||{};
    if(!d || d.target!=='eshare') return;
    if(d.type==='setMode'){
      var m=parseInt(d.value)||0;
      document.querySelectorAll('[data-mode]').forEach(function(b){ b.classList.toggle('active', parseInt(b.dataset.mode)===m); });
      setMode(m);
    }
    if(d.type==='setVersion'){
      switchVersion(parseInt(d.value)||3);
    }
    if(d.type==='showController'){
      document.getElementById('controller').style.display = d.value ? '' : 'none';
    }
  });

  /* ── Init ── */
  switchVersion(3);
  // show controller by default (can be hidden via postMessage)
  document.getElementById('controller').style.display = '';
</script>
</body>
</html>
